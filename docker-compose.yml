services:
  db:
    image: postgres:15-alpine
    container_name: bond_sports_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bank_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: bond_sports_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/bank_db?schema=public"
      PORT: 3000
    depends_on:
      - db

volumes:
  postgres_data: